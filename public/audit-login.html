<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" defer src="/audit-login.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">Admin Only</p>
          <h1>Audit Log Login</h1>
          <p class="lede">Sign in with the admin account to view conversion activity records.</p>
        </div>
      </section>

      <section class="card audit-card">
        <form id="audit-login-form" class="audit-form">
          <label>
            <span>Username</span>
            <input id="audit-username" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input id="audit-password" type="password" autocomplete="current-password" required />
          </label>
          <div class="action-row">
            <button class="primary-button" type="submit">Sign in</button>
            <a class="ghost-link" href="/">Back to app</a>
          </div>
          <p id="audit-login-message" class="audit-message">Use the admin credentials configured on the server.</p>
        </form>
      </section>
    </main>
  </body>
</html>
