<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" defer src="/auditlog.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="hero card">
        <div class="hero-copy">
          <p class="eyebrow">Admin Only</p>
          <h1>Audit Log</h1>
          <p class="lede">Review extraction, export, and calendar insertion activity from this converter.</p>
        </div>
      </section>

      <section class="card audit-card">
        <div class="section-head">
          <h2>Conversion Activity</h2>
          <div class="action-row compact">
            <span id="audit-user-pill" class="pill">Loading user</span>
            <button id="audit-refresh-btn" class="ghost-button" type="button">Refresh</button>
            <button id="audit-logout-btn" class="ghost-button" type="button">Logout</button>
          </div>
        </div>
        <p id="auditlog-message" class="audit-message">Loading audit log...</p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Activity</th>
                <th>Status</th>
                <th>Details</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="auditlog-body">
              <tr class="empty-row">
                <td colspan="5">No audit entries yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
